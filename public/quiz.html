<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Yuh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0D0D0D;
      --card:       #161616;
      --border:     #2a2a2a;
      --purple:     #6C47FF;
      --purple-dim: #3D2899;
      --white:      #FFFFFF;
      --grey:       #A0A0A0;
      --green:      #22C55E;
      --green-bg:   rgba(34, 197, 94, 0.12);
      --red:        #EF4444;
      --red-bg:     rgba(239, 68, 68, 0.12);
      --radius:     12px;
      --radius-lg:  20px;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.5;
    }

    #app {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* Progress bar */
    #progress-bar-track {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: var(--border);
      z-index: 10;
    }
    #progress-bar-fill {
      height: 100%;
      background: var(--purple);
      transition: width 300ms ease;
      width: 0%;
    }

    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem 1.75rem;
      width: 100%;
      max-width: 540px;
    }

    /* Typography */
    .font-display { font-family: 'Syne', sans-serif; font-weight: 800; }

    /* Buttons */
    .btn {
      display: block;
      width: 100%;
      padding: 0.875rem 1.25rem;
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.975rem;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      transition: transform 200ms ease, border-color 200ms ease, background 200ms ease;
    }
    .btn:hover { transform: scale(0.97); border-color: var(--purple); }
    .btn:active { transform: scale(0.94); }
    .btn.btn-primary {
      background: var(--purple);
      border-color: var(--purple);
      text-align: center;
      font-weight: 600;
    }
    .btn.btn-primary:hover { background: var(--purple-dim); border-color: var(--purple-dim); }
    .btn.correct {
      border-color: var(--green);
      background: var(--green-bg);
      pointer-events: none;
    }
    .btn.wrong {
      border-color: var(--red);
      background: var(--red-bg);
      pointer-events: none;
    }
    .btn.locked { pointer-events: none; }

    /* Slide-in animation */
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(40px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .slide-in { animation: slideIn 300ms ease-out forwards; }

    /* Feedback */
    .feedback {
      margin-top: 1.25rem;
      padding: 1rem 1.125rem;
      border-radius: var(--radius);
      background: rgba(108, 71, 255, 0.1);
      border: 1px solid rgba(108, 71, 255, 0.3);
      font-size: 0.875rem;
      color: var(--grey);
      line-height: 1.6;
    }
    .feedback strong { color: var(--white); }

    /* Next button container */
    .next-wrap {
      margin-top: 1.25rem;
    }

    /* Answer options spacing */
    .options { display: flex; flex-direction: column; gap: 0.625rem; margin-top: 1.5rem; }

    /* Score ring */
    .score-big {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(3.5rem, 12vw, 6rem);
      color: var(--purple);
      line-height: 1;
    }

    /* Confetti canvas */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const QUESTIONS = [
      {
        q: "Yuh est régulé par la FINMA.",
        type: "tf",
        options: ["Vrai", "Faux"],
        correct: 0,
        explanation: "Yuh est une néobanque suisse soumise à la surveillance de la <strong>FINMA</strong>, le régulateur financier suisse, ce qui garantit la sécurité de vos fonds."
      },
      {
        q: "Quelle entreprise est à l'origine de Yuh ?",
        type: "mcq",
        options: ["UBS & PostFinance", "Swissquote & PostFinance", "Revolut & SIX Group", "Raiffeisen & Neon"],
        correct: 1,
        explanation: "Yuh a été fondé conjointement par <strong>Swissquote et PostFinance</strong>. PostFinance s'est ensuite retiré du partenariat."
      },
      {
        q: "Comment s'appelle le programme de fidélité de Yuh ?",
        type: "mcq",
        options: ["Yuhcoins", "SwissPoints", "Swisscoins", "NeoPay"],
        correct: 2,
        explanation: "Les <strong>Swisscoins</strong> sont la monnaie de fidélité de Yuh. Vous en gagnez à chaque achat avec votre carte Yuh."
      },
      {
        q: "Yuh propose une application desktop (ordinateur).",
        type: "tf",
        options: ["Vrai", "Faux"],
        correct: 1,
        explanation: "Yuh est <strong>100 % mobile</strong> — aucune version desktop n'existe. Tout se gère depuis l'app sur smartphone."
      },
      {
        q: "Quel type de carte de paiement Yuh propose-t-il ?",
        type: "mcq",
        options: ["Visa Classic", "Mastercard", "American Express", "Diners Club"],
        correct: 1,
        explanation: "Yuh fournit une <strong>Mastercard</strong> pour les paiements en Suisse et à l'international, sans frais cachés."
      },
      {
        q: "On peut investir en cryptomonnaies sur Yuh.",
        type: "tf",
        options: ["Vrai", "Faux"],
        correct: 0,
        explanation: "Oui ! Yuh permet d'acheter et de vendre des <strong>cryptomonnaies</strong> directement depuis l'app, aux côtés des actions et ETF."
      },
      {
        q: "Dans quelles langues est disponible l'app Yuh ?",
        type: "mcq",
        options: ["Français et allemand seulement", "Anglais, français et allemand", "Français, allemand et italien", "Toutes les langues de l'UE"],
        correct: 2,
        explanation: "Yuh couvre les <strong>trois régions linguistiques suisses</strong> : français, allemand et italien."
      },
      {
        q: "Yuh intègre TWINT pour les paiements.",
        type: "tf",
        options: ["Vrai", "Faux"],
        correct: 0,
        explanation: "<strong>TWINT</strong> est intégré directement dans l'app Yuh pour les paiements mobiles en Suisse — la solution de paiement la plus utilisée du pays."
      },
      {
        q: "Quel pilier de prévoyance Yuh propose-t-il ?",
        type: "mcq",
        options: ["1er pilier (AVS)", "2e pilier (LPP)", "3e pilier (3a)", "Aucun pilier"],
        correct: 2,
        explanation: "Yuh permet d'ouvrir un compte <strong>3e pilier (3a)</strong> pour épargner en vue de la retraite avec des avantages fiscaux."
      },
      {
        q: "Parmi ces applications, laquelle n'est PAS une concurrente de Yuh en Suisse ?",
        type: "mcq",
        options: ["Neon", "Revolut", "N26", "Twint"],
        correct: 3,
        explanation: "<strong>Twint</strong> est un système de paiement, pas une néobanque — c'est même un partenaire de Yuh ! Neon, Revolut et N26 sont ses vrais concurrents."
      }
    ];

    // ─── State ────────────────────────────────────────────────────
    const STATE = {
      screen: 'welcome',
      currentQ: 0,
      score: 0,
      answered: false
    };

    function setState(patch) {
      Object.assign(STATE, patch);
      render();
    }

    // ─── Render dispatcher ────────────────────────────────────────
    function render() {
      const app = document.getElementById('app');
      if (STATE.screen === 'welcome')  { renderWelcome(app); return; }
      if (STATE.screen === 'question') { renderQuestion(app); return; }
      if (STATE.screen === 'result')   { renderResult(app); return; }
    }

    // ─── Welcome screen ───────────────────────────────────────────
    function renderWelcome(app) {
      const fill = document.getElementById('progress-bar-fill');
      if (fill) fill.style.width = '0%';
      app.innerHTML = `
        <div class="card slide-in" style="text-align:center; padding: 3rem 2rem;">
          <div class="font-display" style="font-size: clamp(4rem, 15vw, 7rem); color: var(--purple); letter-spacing: -2px; line-height: 1;">
            Yuh
          </div>
          <p style="margin-top: 0.75rem; color: var(--grey); font-size: clamp(0.95rem, 2.5vw, 1.1rem);">
            Testez vos connaissances sur la néobanque suisse
          </p>
          <p style="margin-top: 0.5rem; color: var(--grey); font-size: 0.8rem; opacity: 0.6;">
            10 questions · ~3 minutes
          </p>
          <button class="btn btn-primary" data-action="start" style="margin-top: 2rem; font-size: 1rem; padding: 1rem;">
            Commencer le quiz →
          </button>
        </div>
      `;
    }

    // ─── Event delegation ─────────────────────────────────────────
    document.addEventListener('click', function(e) {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const action = btn.dataset.action;
      if (action === 'start')   { startQuiz(); }
      if (action === 'answer')  { handleAnswer(parseInt(btn.dataset.index, 10)); }
      if (action === 'next')    { nextQuestion(); }
      if (action === 'restart') { restartQuiz(); }
    });

    function startQuiz() {
      STATE.currentQ = 0;
      STATE.score = 0;
      STATE.answered = false;
      STATE.screen = 'question';
      render();
    }

    function restartQuiz() {
      STATE.screen = 'welcome';
      render();
    }

    // ─── Boot ─────────────────────────────────────────────────────
    render();
  </script>
</body>
</html>
