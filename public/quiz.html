<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Yuh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0D0D0D;
      --card:       #161616;
      --border:     #2a2a2a;
      --purple:     #6C47FF;
      --purple-dim: #3D2899;
      --white:      #FFFFFF;
      --grey:       #A0A0A0;
      --green:      #22C55E;
      --green-bg:   rgba(34, 197, 94, 0.12);
      --red:        #EF4444;
      --red-bg:     rgba(239, 68, 68, 0.12);
      --radius:     12px;
      --radius-lg:  20px;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.5;
    }

    #app {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* Progress bar */
    #progress-bar-track {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: var(--border);
      z-index: 10;
    }
    #progress-bar-fill {
      height: 100%;
      background: var(--purple);
      transition: width 300ms ease;
      width: 0%;
    }

    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem 1.75rem;
      width: 100%;
      max-width: 540px;
    }

    /* Typography */
    .font-display { font-family: 'Syne', sans-serif; font-weight: 800; }

    /* Buttons */
    .btn {
      display: block;
      width: 100%;
      padding: 0.875rem 1.25rem;
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.975rem;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      transition: transform 200ms ease, border-color 200ms ease, background 200ms ease;
    }
    .btn:hover { transform: scale(0.97); border-color: var(--purple); }
    .btn:active { transform: scale(0.94); }
    .btn.btn-primary {
      background: var(--purple);
      border-color: var(--purple);
      text-align: center;
      font-weight: 600;
    }
    .btn.btn-primary:hover { background: var(--purple-dim); border-color: var(--purple-dim); }
    .btn.correct {
      border-color: var(--green);
      background: var(--green-bg);
      pointer-events: none;
    }
    .btn.wrong {
      border-color: var(--red);
      background: var(--red-bg);
      pointer-events: none;
    }
    .btn.locked { pointer-events: none; }

    /* Slide-in animation */
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(40px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .slide-in { animation: slideIn 300ms ease-out forwards; }

    /* Feedback */
    .feedback {
      margin-top: 1.25rem;
      padding: 1rem 1.125rem;
      border-radius: var(--radius);
      background: rgba(108, 71, 255, 0.1);
      border: 1px solid rgba(108, 71, 255, 0.3);
      font-size: 0.875rem;
      color: var(--grey);
      line-height: 1.6;
    }
    .feedback strong { color: var(--white); }

    /* Next button container */
    .next-wrap {
      margin-top: 1.25rem;
    }

    /* Answer options spacing */
    .options { display: flex; flex-direction: column; gap: 0.625rem; margin-top: 1.5rem; }

    /* Score ring */
    .score-big {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(3.5rem, 12vw, 6rem);
      color: var(--purple);
      line-height: 1;
    }

    /* Confetti canvas */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    // JS goes here in Task 2+
  </script>
</body>
</html>
