<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Yuh</title>
  <style>
    @font-face {
      font-family: 'ProximaSoft';
      src: url('/fonts/ProximaSoft-Medium.woff2') format('woff2'),
           url('/fonts/ProximaSoft-Medium.woff') format('woff');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'ProximaSoft';
      src: url('/fonts/ProximaSoft-MediumIt.woff2') format('woff2'),
           url('/fonts/ProximaSoft-MediumIt.woff') format('woff');
      font-weight: 500;
      font-style: italic;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #FFFFFF;
      --card:       #F7F7F8;
      --border:     #E2E2E5;
      --purple:     #FA5B35;
      --purple-dim: #FA5B35;
      --purple-glow: rgba(250, 91, 53, 0.20);
      --text:       #1A1A1A;
      --grey:       #6B6B6B;
      --grey-dim:   rgba(100,100,100,0.5);
      --green:      #16A34A;
      --green-bg:   rgba(22, 163, 74, 0.10);
      --red:        #DC2626;
      --red-bg:     rgba(220, 38, 38, 0.08);
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'ProximaSoft', system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Scrollbar ──────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── App shell ──────────────────────────────────────── */
    #app {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
      position: relative;
      overflow: hidden;
    }

    /* ── Welcome gradient orbs (scoped via .welcome-active) ── */
    #app.welcome-active {
      background: #F3EFF9;
      transition: background 0.4s ease;
    }

    #app.welcome-active::before,
    #app.welcome-active::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    #app.welcome-active::before {
      /* Sky — haut-gauche */
      width:  clamp(420px, 115vw, 700px);
      height: clamp(420px, 115vw, 700px);
      background: radial-gradient(circle at center,
        rgba(148, 194, 223, 1.0)  0%,
        rgba(100, 160, 205, 0.5) 30%,
        rgba(230, 222, 240, 0.45) 65%,
        transparent 82%
      );
      filter: blur(90px);
      top: -20%; left: -25%;
      animation: orbDrift1 14s ease-in-out infinite;
    }

    #app.welcome-active::after {
      /* Pearl — bas-droite */
      width:  clamp(380px, 105vw, 660px);
      height: clamp(380px, 105vw, 660px);
      background: radial-gradient(circle at center,
        rgba(204, 177, 218, 1.0)  0%,
        rgba(230, 222, 240, 0.80) 40%,
        rgba(255, 255, 255, 0.20) 68%,
        transparent 82%
      );
      filter: blur(60px);
      bottom: -15%; right: -20%;
      animation: orbDrift2 18s ease-in-out infinite alternate;
    }

    @keyframes orbDrift1 {
      0%   { transform: translate(0,    0)   scale(1);    }
      30%  { transform: translate(8%,  12%)  scale(1.06); }
      60%  { transform: translate(-4%, 18%)  scale(0.97); }
      100% { transform: translate(0,    0)   scale(1);    }
    }

    @keyframes orbDrift2 {
      0%   { transform: translate(0,    0)   scale(1);    }
      40%  { transform: translate(-10%, -8%) scale(1.08); }
      100% { transform: translate(4%,  -14%) scale(0.95); }
    }

    @media (prefers-reduced-motion: reduce) {
      #app.welcome-active::before,
      #app.welcome-active::after { animation: none; }
    }

    .screen-content {
      position: relative;
      z-index: 1;
      width: 100%;
    }

    /* ── Welcome ────────────────────────────────────────── */
    .welcome-wrap {
      max-width: 480px;
      margin: 0 auto;
      text-align: left;
      padding: 0 0.5rem;
    }

    .wordmark {
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 500ms ease-out 0ms forwards;
    }
    .wordmark img {
      width: clamp(180px, 55vw, 340px);
      height: auto;
      display: block;
      filter: none;
    }

    .welcome-tagline {
      margin-top: 1.5rem;
      font-size: clamp(1.1rem, 3.5vw, 1.4rem);
      font-style: italic;
      color: var(--text);
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 450ms ease-out 200ms forwards;
    }

    .welcome-meta {
      margin-top: 0.6rem;
      font-size: 0.78rem;
      color: var(--grey);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(8px);
      animation: fadeUp 400ms ease-out 380ms forwards;
    }

    .welcome-cta {
      margin-top: 2.5rem;
      opacity: 0;
      transform: translateY(8px);
      animation: fadeUp 400ms ease-out 520ms forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes growLine {
      to { opacity: 1; transform: scaleX(1); }
    }

    /* ── Buttons ────────────────────────────────────────── */
    .btn {
      display: block;
      width: 100%;
      padding: 1rem 1.25rem;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text);
      font-family: 'ProximaSoft', system-ui, sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      transition: border-color 180ms ease, background 180ms ease, transform 120ms ease;
      min-height: 52px;
      overflow-wrap: break-word;
      hyphens: auto;
    }
    .btn:hover:not([disabled]):not(.locked) {
      border-color: var(--purple);
      background: rgba(250, 91, 53, 0.08);
    }
    .btn:active:not(.locked) {
      transform: scale(0.96);
    }

    .btn-primary {
      background: var(--purple);
      border-color: var(--purple);
      color: #FFFFFF;
      text-align: center;
      font-size: 1rem;
      padding: 1.1rem 1.5rem;
      border-radius: 10px;
    }
    .btn-primary:hover { background: var(--purple-dim); border-color: var(--purple-dim); color: #000000; }
    .btn-primary:active { transform: scale(0.96); }

    .btn.correct {
      border-color: var(--green);
      background: var(--green-bg);
      color: var(--green);
      pointer-events: none;
    }
    .btn.wrong {
      border-color: var(--red);
      background: var(--red-bg);
      color: var(--red);
      pointer-events: none;
    }
    .btn.locked {
      pointer-events: none;
      opacity: 0.45;
    }
    .btn.correct, .btn.wrong { opacity: 1; }

    /* ── Question layout ────────────────────────────────── */
    .question-wrap {
      max-width: 580px;
      margin: 0 auto;
      width: 100%;
      position: relative;
    }

    .q-counter {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--grey);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .q-counter-dots {
      display: flex;
      gap: 4px;
    }
    .q-counter-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--border);
      transition: background 300ms ease;
    }
    .q-counter-dot.done { background: var(--purple); }
    .q-counter-dot.active { background: var(--text); }

    .q-ghost-num {
      position: absolute;
      top: -1rem;
      right: -0.5rem;
      font-size: clamp(7rem, 22vw, 13rem);
      color: var(--purple);
      opacity: 0.06;
      line-height: 1;
      pointer-events: none;
      user-select: none;
      z-index: 0;
      letter-spacing: -6px;
    }

    .q-body {
      position: relative;
      z-index: 1;
    }

    .q-text {
      font-size: clamp(1.15rem, 3.5vw, 1.5rem);
      line-height: 1.4;
      color: var(--text);
      margin-bottom: 1.75rem;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    /* ── Feedback box ───────────────────────────────────── */
    .feedback {
      margin-top: 1.25rem;
      padding: 1rem 1.125rem;
      border-radius: 10px;
      background: rgba(108, 71, 255, 0.06);
      border: 1px solid rgba(108, 71, 255, 0.15);
      font-size: 0.875rem;
      font-style: italic;
      color: var(--grey);
      line-height: 1.65;
      animation: feedbackIn 280ms ease-out forwards;
    }
    .feedback strong {
      color: var(--text);
      font-style: normal;
    }

    @keyframes feedbackIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Card glow on correct */
    @keyframes correctGlow {
      0%   { box-shadow: none; }
      40%  { box-shadow: 0 0 0 2px var(--purple), 0 0 32px var(--purple-glow); }
      100% { box-shadow: none; }
    }
    .glow-correct {
      animation: correctGlow 700ms ease-out forwards;
    }

    /* ── Next button ────────────────────────────────────── */
    .next-wrap {
      margin-top: 1.25rem;
      animation: feedbackIn 280ms ease-out 80ms both;
    }

    /* ── Slide transitions ──────────────────────────────── */
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(36px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideOutLeft {
      from { opacity: 1; transform: translateX(0); }
      to   { opacity: 0; transform: translateX(-36px); }
    }

    .slide-in  { animation: slideInRight 280ms cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    .slide-out { animation: slideOutLeft 220ms ease-in forwards; }

    /* ── Result screen ──────────────────────────────────── */
    .result-wrap {
      max-width: 520px;
      margin: 0 auto;
      text-align: left;
      padding: 0 0.5rem;
      position: relative;
    }

    .result-label {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--grey);
      margin-bottom: 1.5rem;
    }

    .result-ghost {
      position: absolute;
      top: -1.5rem;
      right: -1rem;
      font-size: clamp(8rem, 28vw, 16rem);
      color: var(--purple);
      opacity: 0.06;
      line-height: 1;
      pointer-events: none;
      user-select: none;
      letter-spacing: -8px;
    }

    .score-display {
      font-size: clamp(4rem, 14vw, 7rem);
      color: var(--purple);
      line-height: 1;
      letter-spacing: -3px;
    }
    .score-display span {
      font-size: 0.4em;
      color: var(--grey);
      letter-spacing: 0;
    }

    .result-title {
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      color: var(--text);
      line-height: 1.25;
      margin-top: 1.25rem;
    }

    .result-sub {
      color: var(--grey);
      font-size: 0.95rem;
      margin-top: 0.5rem;
      font-style: italic;
    }

    .result-actions {
      margin-top: 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .result-line {
      width: 36px;
      height: 2px;
      background: var(--purple);
      margin-top: 1.75rem;
    }

    /* ── Confetti ───────────────────────────────────────── */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 200;
    }

    /* ── Responsive ─────────────────────────────────────── */
    @media (max-width: 380px) {
      .btn { padding: 0.875rem 1rem; font-size: 0.9rem; min-height: 48px; }
      .q-ghost-num { display: none; }
    }

    @media (min-width: 640px) {
      #app { padding: 3rem 2rem; }
      .wordmark img { width: clamp(220px, 45vw, 380px); }
    }
  </style>
</head>
<body>
  <div id="app"><div class="screen-content" id="screen"></div></div>

  <script>
    const QUESTIONS = [
      {
        q: "Yuh est supervisé par la FINMA.",
        type: "tf",
        options: ["Vrai", "Faux"],
        correct: 0,
        feedbackOk:   "Exactement ! Tes fonds sont entre de bonnes mains 🇨🇭",
        feedbackFail: "Pas cette fois — Yuh est bien sous la loupe de la FINMA, le régulateur financier suisse."
      },
      {
        q: "Quel duo a lancé Yuh ?",
        type: "mcq",
        options: ["UBS & PostFinance", "Swissquote & PostFinance", "Revolut & SIX Group", "Raiffeisen & Neon"],
        correct: 1,
        feedbackOk:   "Swissquote + PostFinance = Yuh. Un beau duo 💜 (PostFinance s'est depuis retiré du partenariat.)",
        feedbackFail: "C'est <strong>Swissquote & PostFinance</strong> qui ont lancé l'aventure — PostFinance s'est ensuite retiré."
      },
      {
        q: "Comment s'appelle le programme de fidélité de Yuh ?",
        type: "mcq",
        options: ["Yuhcoins", "SwissPoints", "Swisscoins", "NeoPay"],
        correct: 2,
        feedbackOk:   "Tu connais ta monnaie ! Les <strong>Swisscoins</strong> s'accumulent à chaque achat 💜",
        feedbackFail: "C'est les <strong>Swisscoins</strong> ! Ils récompensent chaque coup de carte Yuh."
      },
      {
        q: "Yuh existe aussi en version ordinateur.",
        type: "tf",
        options: ["Vrai", "Faux"],
        correct: 1,
        feedbackOk:   "Exactement — Yuh c'est <strong>100 % mobile</strong>, le bureau c'est pour les autres 📱",
        feedbackFail: "Nope — Yuh reste sur ton smartphone. Pas besoin d'ordi, tout est dans ta poche."
      },
      {
        q: "Quel type de carte Yuh te propose-t-il ?",
        type: "mcq",
        options: ["Visa Classic", "Mastercard", "American Express", "Diners Club"],
        correct: 1,
        feedbackOk:   "<strong>Mastercard</strong>, partout dans le monde, sans frais cachés 🌍",
        feedbackFail: "C'est une <strong>Mastercard</strong> — acceptée partout dans le monde, sans mauvaises surprises."
      },
      {
        q: "Tu peux investir en cryptos directement dans Yuh.",
        type: "tf",
        options: ["Vrai", "Faux"],
        correct: 0,
        feedbackOk:   "Yep ! Bitcoin, Ethereum et cie — tout ça depuis l'app 🚀",
        feedbackFail: "Si ! Les cryptos, c'est aussi dans Yuh — à portée de pouce, entre deux Insta Stories."
      },
      {
        q: "Dans quelles langues est disponible Yuh ?",
        type: "mcq",
        options: ["Français et allemand seulement", "Anglais, français et allemand", "Français, allemand et italien", "Toutes les langues de l'UE"],
        correct: 2,
        feedbackOk:   "FR, DE, IT — Yuh parle les <strong>3 langues de la Suisse</strong> 🇨🇭",
        feedbackFail: "Yuh couvre les 3 régions : <strong>français, allemand et italien</strong> — 100 % helvétique."
      },
      {
        q: "TWINT est intégré dans Yuh.",
        type: "tf",
        options: ["Vrai", "Faux"],
        correct: 0,
        feedbackOk:   "TWINT dans Yuh — payer en Suisse, ça n'a jamais été aussi simple 📱",
        feedbackFail: "Si ! <strong>TWINT</strong> est directement dans l'app Yuh — pratique, non ?"
      },
      {
        q: "Quel pilier prévoyance Yuh propose-t-il ?",
        type: "mcq",
        options: ["1er pilier (AVS)", "2e pilier (LPP)", "3e pilier (3a)", "Aucun pilier"],
        correct: 2,
        feedbackOk:   "Le <strong>3e pilier</strong> dans l'app — épargne retraite avec avantages fiscaux 💰",
        feedbackFail: "C'est le <strong>3e pilier (3a)</strong> — idéal pour préparer ta retraite avec style."
      },
      {
        q: "Parmi ces apps, laquelle n'est PAS concurrente de Yuh ?",
        type: "mcq",
        options: ["Neon", "Revolut", "N26", "Twint"],
        correct: 3,
        feedbackOk:   "Bonne lecture ! <strong>TWINT</strong> est un partenaire de Yuh, pas un rival — Neon, Revolut et N26 sont les vrais concurrents.",
        feedbackFail: "<strong>TWINT</strong> est intégré dans Yuh — partenaire, pas concurrent ! Neon, Revolut et N26 jouent dans l'autre camp."
      }
    ];

    const SCORE_TIERS = [
      { min: 0,  max: 3,  title: "Explore Yuh, tout commence ici",    sub: "L'aventure ne fait que commencer" },
      { min: 4,  max: 6,  title: "Tu gères, continue comme ça",        sub: "Pas mal — encore quelques secrets à découvrir" },
      { min: 7,  max: 9,  title: "Presque expert — encore un peu",     sub: "Tu touches au but, presque parfait" },
      { min: 10, max: 10, title: "Expert Yuh. L'argent te remerciera", sub: "Score parfait — tu maîtrises tout 🏆" }
    ];

    // ── State ──────────────────────────────────────────────
    const S = { screen: 'welcome', currentQ: 0, score: 0, answered: false };

    // ── Render ─────────────────────────────────────────────
    function render() {
      const el = document.getElementById('screen');
      if (S.screen === 'welcome')  { renderWelcome(el);  return; }
      if (S.screen === 'question') { renderQuestion(el); return; }
      if (S.screen === 'result')   { renderResult(el);   return; }
    }

    // ── Welcome ────────────────────────────────────────────
    function renderWelcome(el) {
      document.getElementById('app').classList.add('welcome-active');
      el.innerHTML = `
        <div class="welcome-wrap">
          <div class="wordmark"><img src="/Yuh_Logo_Single-Claim-FR_Black_RGB.svg" alt="Yuh" /></div>
          <p class="welcome-tagline">Yuh for you</p>
          <p class="welcome-meta">10 questions · sans prise de tête</p>
          <div class="welcome-cta">
            <button class="btn btn-primary" data-action="start">C'est parti →</button>
          </div>
        </div>
      `;
    }

    // ── Question ───────────────────────────────────────────
    function renderQuestion(el, animate) {
      document.getElementById('app').classList.remove('welcome-active');
      const q   = QUESTIONS[S.currentQ];
      const num = S.currentQ + 1;
      const pad = String(num).padStart(2, '0');

      const dotsHtml = QUESTIONS.map((_, i) => {
        const cls = i < S.currentQ ? 'done' : i === S.currentQ ? 'active' : '';
        return `<span class="q-counter-dot ${cls}"></span>`;
      }).join('');

      const optsHtml = q.options.map((opt, i) => `
        <button class="btn" data-action="answer" data-index="${i}">${opt}</button>
      `).join('');

      const slideClass = animate === false ? '' : 'slide-in';

      el.innerHTML = `
        <div class="question-wrap ${slideClass}">
          <div class="q-ghost-num">${pad}</div>
          <div class="q-body">
            <div class="q-counter">
              <span>${pad} / ${String(QUESTIONS.length).padStart(2,'0')}</span>
              <div class="q-counter-dots">${dotsHtml}</div>
            </div>
            <p class="q-text">${q.q}</p>
            <div class="options" id="options-list">${optsHtml}</div>
            <div id="feedback-zone"></div>
            <div id="next-zone"></div>
          </div>
        </div>
      `;
    }

    // ── Answer ─────────────────────────────────────────────
    function handleAnswer(idx) {
      if (S.answered) return;
      S.answered = true;

      const q = QUESTIONS[S.currentQ];
      const ok = idx === q.correct;
      if (ok) S.score++;

      document.querySelectorAll('#options-list .btn').forEach((btn, i) => {
        if (i === q.correct)         btn.classList.add('correct');
        else if (i === idx && !ok)   btn.classList.add('wrong');
        else                          btn.classList.add('locked');
      });

      if (ok) {
        const wrap = document.querySelector('.question-wrap');
        if (wrap) {
          wrap.classList.add('glow-correct');
          wrap.addEventListener('animationend', () => wrap.classList.remove('glow-correct'), { once: true });
        }
      }

      document.getElementById('feedback-zone').innerHTML = `
        <div class="feedback">
          <strong>${ok ? '✓' : '→'}</strong> ${ok ? q.feedbackOk : q.feedbackFail}
        </div>
      `;

      const isLast = S.currentQ === QUESTIONS.length - 1;
      document.getElementById('next-zone').innerHTML = `
        <div class="next-wrap">
          <button class="btn btn-primary" data-action="next">
            ${isLast ? 'Voir mes résultats →' : 'Continuer →'}
          </button>
        </div>
      `;
    }

    // ── Next / transition ──────────────────────────────────
    function nextQuestion() {
      const wrap = document.querySelector('.question-wrap');
      if (wrap) {
        wrap.classList.add('slide-out');
        wrap.addEventListener('animationend', () => {
          if (S.currentQ < QUESTIONS.length - 1) {
            S.currentQ++;
            S.answered = false;
            renderQuestion(document.getElementById('screen'));
          } else {
            S.screen = 'result';
            render();
          }
        }, { once: true });
      } else {
        if (S.currentQ < QUESTIONS.length - 1) {
          S.currentQ++;
          S.answered = false;
          renderQuestion(document.getElementById('screen'));
        } else {
          S.screen = 'result';
          render();
        }
      }
    }

    // ── Result ─────────────────────────────────────────────
    function renderResult(el) {
      document.getElementById('app').classList.remove('welcome-active');
      const s = S.score;
      const tier = SCORE_TIERS.find(t => s >= t.min && s <= t.max);

      el.innerHTML = `
        <div class="result-wrap slide-in">
          <div class="result-ghost">${s}</div>
          <p class="result-label">Résultat final</p>
          <div class="score-display">${s}<span> / ${QUESTIONS.length}</span></div>
          <div class="result-line"></div>
          <p class="result-title">${tier.title}</p>
          <p class="result-sub">${tier.sub}</p>
          <div class="result-actions">
            <button class="btn btn-primary" data-action="restart">Recommencer</button>
          </div>
        </div>
      `;

      if (s >= 7) launchConfetti();
    }

    // ── Event delegation ───────────────────────────────────
    document.addEventListener('click', e => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const a = btn.dataset.action;
      if (a === 'start')   { S.screen = 'question'; S.currentQ = 0; S.score = 0; S.answered = false; render(); }
      if (a === 'answer')  { handleAnswer(parseInt(btn.dataset.index, 10)); }
      if (a === 'next')    { nextQuestion(); }
      if (a === 'restart') { S.screen = 'welcome'; S.currentQ = 0; S.score = 0; S.answered = false; render(); }
    });

    // ── Confetti ───────────────────────────────────────────
    function launchConfetti() {
      const existing = document.getElementById('confetti-canvas');
      if (existing) existing.remove();

      const canvas = document.createElement('canvas');
      canvas.id = 'confetti-canvas';
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      document.body.appendChild(canvas);

      const ctx = canvas.getContext('2d');
      const COLORS = ['#6C47FF','#8B5CF6','#5835DB','#22C55E','#FF6B6B','#6C47FF','#6C47FF'];
      const COUNT  = 160;

      const particles = Array.from({ length: COUNT }, () => ({
        x:     Math.random() * canvas.width,
        y:     Math.random() * canvas.height * 0.35 - canvas.height * 0.1,
        vx:    (Math.random() - 0.5) * 5,
        vy:    Math.random() * -5 - 1.5,
        w:     Math.random() * 8 + 4,
        h:     Math.random() * 4 + 2,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        angle: Math.random() * Math.PI * 2,
        spin:  (Math.random() - 0.5) * 0.18,
        alpha: 1
      }));

      let t0 = null;
      const FADE_START = 2200;
      const FADE_END   = 2800;

      function tick(ts) {
        if (!t0) t0 = ts;
        const elapsed = ts - t0;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        particles.forEach(p => {
          p.x    += p.vx;
          p.vy   += 0.18;
          p.y    += p.vy;
          p.angle += p.spin;
          p.alpha = elapsed < FADE_START
            ? 1
            : Math.max(0, 1 - (elapsed - FADE_START) / (FADE_END - FADE_START));

          ctx.save();
          ctx.globalAlpha = p.alpha;
          ctx.translate(p.x, p.y);
          ctx.rotate(p.angle);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          ctx.restore();
        });

        if (elapsed < FADE_END) requestAnimationFrame(tick);
        else canvas.remove();
      }

      requestAnimationFrame(tick);
    }

    // ── Boot ───────────────────────────────────────────────
    render();
  </script>
</body>
